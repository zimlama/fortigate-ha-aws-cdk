name: CI

on:
  push:
    branches: [master, developer]
  pull_request:
    branches: [master, developer]

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Hexagonal failover validator — pure TypeScript domain, zero AWS calls
  # ──────────────────────────────────────────────────────────────────────────
  validator:
    name: Validator — typecheck + tests + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: validator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: validator/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit
      - name: Run tests with coverage gate
        # jest.config.ts already enforces ≥90% coverage on branches, functions,
        # lines, statements. The test command exits non-zero if the gate fails.
        run: npm run test:coverage

  # ──────────────────────────────────────────────────────────────────────────
  # CDK infrastructure — fine-grained assertion tests (no AWS calls)
  # ──────────────────────────────────────────────────────────────────────────
  infra:
    name: Infra — typecheck + CDK assertion tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit
      - name: Run CDK assertion tests
        run: npm test
