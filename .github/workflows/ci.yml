name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validator:
    name: Validator — unit tests + coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: validator
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: validator/package-lock.json
      - run: npm ci
      - run: npm test -- --coverage --coverageReporters=text-summary

  infra:
    name: Infra — CDK assertion tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: infra/package-lock.json
      - run: npm ci
      - run: npm test
